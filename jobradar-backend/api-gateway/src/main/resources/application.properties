# Cấu hình cổng server cho Gateway
server.port=8080

# Tên ứng dụng
spring.application.name=api-gateway

# ==========================================
# Cấu hình Route cho Spring Cloud Gateway
# ==========================================
# ID của route đầu tiên (index 0)
spring.cloud.gateway.routes[0].id=auth-service

# Đích đến (gọi sang auth-service đang chạy ở cổng 8081)
spring.cloud.gateway.routes[0].uri=http://localhost:8081

# Điều kiện khớp (Path: nếu URL bắt đầu bằng /api/v1/auth thì sẽ khớp)
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

# Gắn Filter kiểm tra Token vào route này
spring.cloud.gateway.routes[0].filters[0]=AuthenticationFilter

# ==========================================
# Cấu hình JWT Secret Key (Đồng bộ với auth-service)
# ==========================================
application.security.jwt.secret-key=${JWT_SECRET_KEY:4qhq8L6lQ2cO7gP9XbZ8aK3mN1xV5wE4qhq8L6lQ2cM=}

# Hiển thị log ở mức DEBUG để dễ dàng theo dõi việc điều hướng
logging.level.org.springframework.cloud.gateway=DEBUG

# ==========================================
# Cấu hình CORS toàn cầu (Global CORS)
# ==========================================
# Cho phép Frontend ReactJS (cổng 5173) gọi API
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

# ==========================================
# Cấu hình thêm Route cho OAuth2 (Chuyển tiếp tới auth-service)
# ==========================================
# Route khởi tạo đăng nhập OAuth2
spring.cloud.gateway.routes[1].id=oauth2-login
spring.cloud.gateway.routes[1].uri=http://localhost:8081
spring.cloud.gateway.routes[1].predicates[0]=Path=/oauth2/**

# Route callback nhận code từ nhà cung cấp (Google/Github)
spring.cloud.gateway.routes[2].id=oauth2-callback
spring.cloud.gateway.routes[2].uri=http://localhost:8081
spring.cloud.gateway.routes[2].predicates[0]=Path=/login/oauth2/code/**

# Route cho Job Service (Chuyển tiếp tới cổng 8083)
spring.cloud.gateway.routes[3].id=job-service
spring.cloud.gateway.routes[3].uri=http://localhost:8083
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/jobs/**


