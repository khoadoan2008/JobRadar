# Cấu hình cổng server
server.port=8081
spring.application.name=auth-service

# Cấu hình kết nối PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/jobradar_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# Cấu hình JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# ===============================
# JWT (JSON Web Token) Config
# ===============================
# Lấy từ biến môi trường JWT_SECRET_KEY, bắt buộc phải có (fallback về chuỗi mặc định cho môi trường DEV)
application.security.jwt.secret-key=${JWT_SECRET_KEY:4qhq8L6lQ2cO7gP9XbZ8aK3mN1xV5wE4qhq8L6lQ2cM=}
# Tương tự với thời gian sống của token
application.security.jwt.expiration=900000
application.security.jwt.refresh-token.expiration=604800000

# ===============================
# OAuth2 Client Config
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_DEFAULT_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_DEFAULT_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:YOUR_DEFAULT_GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:YOUR_DEFAULT_GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=user:email,read:user
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Cấu hình URL frontend cho redirect sau khi login thành công
app.frontend.url=http://localhost:5173

# ===============================
# Cấu hình Webhook Gửi Email (Google Apps Script)
# ===============================
webhook.email.url=${WEBHOOK_EMAIL_URL:https://script.google.com/macros/s/AKfycbwObDaTGwYV_xBQFVtDozAir785PQyVFGE-3dCdQnHampzMpBLzWu70DhHLWzS-AZas/exec}